<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoleandoAndo - F1</title>
    <link rel="shortcut icon" href="../../assets/imgs/f1.png">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/mainSection.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/scrollbar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <meta property="og:title" content="Goleando Ando ⚽🔥">
    <meta property="og:description"
        content="Resultados, tablas y fixtures actualizados de las principales ligas y competencias de fútbol.">
    <meta property="og:image"
        content="https://raw.githubusercontent.com/lauty061/Goleando-Ando/refs/heads/main/imgs/metaIcon.png">
    <meta property="og:type" content="website">
</head>

<body class="fondo">
    <header id="main-header"></header>
    <a id="ancla"></a>
    <div class="liga-banner"></a>
        <h1 id="titulo-liga">Formula 1</h1>
        <img src="../../assets/imgs/f1.png  " class="logo">
    </div>
    <main class="contenedor">
        <section class="seccion">
            <h2 class="titulo-seccion">Calendario</h2>
            <div class="season-filter-container">
                <label for="season-select">Temporada:</label>
                <select id="season-select">
                </select>
                <a href="f1-historicos.html" class="records-link">
                    📊 Récords Históricos
                </a>
            </div>
            <div class="scrollable-table">
            <div class="fecha-selector-container">
                <button class="fecha-arrow" id="fecha-prev">◀</button>
                <div class="fecha-display-wrapper">
                    <div class="fecha-display" id="fecha-display">Carrera</div>
                    <select class="fecha-select" id="fecha-select"></select>
                </div>
                <button class="fecha-arrow" id="fecha-next">▶</button>
            </div>
            <div id="race-details"></div>
            </div>
        </section>
        <section class="seccion">
            <h2 class="titulo-seccion">Última Carrera</h2>
            <div class="scrollable-table">
                <table class="tabla" id="tabla-ultima-carrera">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
        <section class="seccion">
            <h2 class="titulo-seccion">Clasificación de Pilotos</h2>
            <div class="scrollable-table">
                <table class="tabla" id="tabla-posiciones-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
        <section class="seccion">
            <h2 class="titulo-seccion">Clasificación de Constructores</h2>
            <div class="scrollable-table">
                <table class="tabla" id="tabla-goleadores">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../scripts/scriptf1.js"></script>
    <script src="../scripts/navScript.js"></script>
</body>

</html>
