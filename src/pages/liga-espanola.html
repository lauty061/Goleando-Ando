<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoleandoAndo - La Liga</title>
    <link rel="shortcut icon" href="../../assets/imgs/LaLigaLogo.png">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/mainSection.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/scrollbar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta property="og:title" content="Goleando Ando ⚽🔥">
    <meta property="og:description" content="Resultados, tablas y fixtures actualizados de las principales ligas y competencias de fútbol.">
    <meta property="og:image" content="https://raw.githubusercontent.com/lauty061/Goleando-Ando/refs/heads/main/imgs/metaIcon.png">
    <meta property="og:type" content="website">
</head>
<body class="fondo">
    <header id="main-header"></header>
    <a id="ancla"></a><div class="liga-banner"></a>
        <h1 id="titulo-liga">La Liga</h1>
        <img src="../../assets/imgs/LaLigaLogo.png"class="logo">
    </div>
    <main>
        <section id="fixture">
            <h2>Fixture</h2>
            <div class="fecha-selector-container">

                <button class="fecha-arrow" id="fecha-prev">◀</button>

                <div class="fecha-display-wrapper">

                    <div class="fecha-display" id="fecha-display">FECHA 1</div>

                    <select class="fecha-select" id="fecha-select"></select>

                </div>

                <button class="fecha-arrow" id="fecha-next">▶</button>

            </div>
            <table id="fixture-table"></table>
        </section>
        <section id="posiciones">
            <h2>Tabla de Posiciones</h2>
            <div class="scrollable-table">
                <table id="tabla-posiciones-table"></table>
            </div>
            <div class="ref-container">
                <div class="ref-item"><span class="dot dot-oro"></span> Campeón</div>
                <div class="ref-item"><span class="dot dot-azul"></span> Champions League</div>
                <div class="ref-item"><span class="dot dot-naranja"></span> Europa League</div>
                <div class="ref-item"><span class="dot dot-verde"></span> Conference League</div>
                <div class="ref-item"><span class="dot dot-roja"></span> Descenso</div>
            </div>
        </section>        
        <section id="goleadores">
            <h2>Tabla de Goleadores</h2>
            <table id="tabla-goleadores"></table>
        </section>
        <a href="#ancla" class="boton-inicio" aria-label="Volver al inicio">⇧</a>
    </main>    
    <script src="../scripts/LeagueManager.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            new LeagueRenderer({
                jsonPath: "../JSONs/resultadosesp.json",
                fixtureField: "fecha_torneo",
                zonasConfig: [{match: 1, class: "zona-oro"}, {start: 2, end: 4, class: "zona-azul"}, {match: 5, class: "zona-naranja"}, {match: 6, class: "zona-verde"}, {start: 18, end: 20, class: "zona-roja"}]
            });
        });
    </script>
    <script src="../scripts/navScript.js"></script>
</body>
</html>
