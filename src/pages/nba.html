<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoleandoAndo - NBA</title>
    <link rel="shortcut icon" href="../../assets/imgs/logo-nba-256.png">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/mainSection.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/scrollbar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta property="og:title" content="Goleando Ando ⚽🔥">
    <meta property="og:description" content="Resultados, tablas y fixtures actualizados de las principales ligas y competencias de fútbol.">
    <meta property="og:image" content="https://raw.githubusercontent.com/lauty061/Goleando-Ando/refs/heads/main/imgs/metaIcon.png">
    <meta property="og:type" content="website">
</head>
<body class="fondo">
    <header id="main-header"></header>
    <a id="ancla"></a>
    <div class="liga-banner">
        <h1 id="titulo-liga">NBA</h1>
        <img class="logo" src="../../assets/imgs/logo-nba-256.png">
    </div>
<main>
        <section id="fixture">
            <h2>Fixture</h2>
            <div class="fecha-selector-container">
                <button class="fecha-arrow" id="fecha-prev">◀</button>
                <div class="fecha-display-wrapper">
                    <div class="fecha-display" id="fecha-display">Fecha</div>
                    <select class="fecha-select" id="ronda-select"></select>
                </div>
                <button class="fecha-arrow" id="fecha-next">▶</button>
            </div>
            <div class="scrollable-table">
                <table id="fixture-table">
                    </table>
            </div>
        </section>

        <section id="posiciones">
            <h2>Tabla de Posiciones</h2>
            <div class="filter-container">
                <label for="conferencia-select">Conferencia:</label>
                <select id="conferencia-select"></select>
            </div>
            <div class="scrollable-table">
                <table id="tabla-posiciones-table">
                    </table>
            </div>
            <div class="ref-container">
                <div class="ref-item"><span class="dot dot-verde"></span> Playoffs</div>
                <div class="ref-item"><span class="dot dot-oro"></span> Play-In</div>
            </div>
        </section>

        <section id="estadisticas">
            <h2>Líderes de Temporada</h2>
            
            <div class="stats-tabs">
                <button class="tab-btn active" onclick="cambiarStat('puntos')">Puntos</button>
                <button class="tab-btn" onclick="cambiarStat('rebotes')">Rebotes</button>
                <button class="tab-btn" onclick="cambiarStat('asistencias')">Asistencias</button>
                <button class="tab-btn" onclick="cambiarStat('robos')">Robos</button>
                <button class="tab-btn" onclick="cambiarStat('tapones')">Tapones</button>
            </div>

            <div class="scrollable-table">
                <table id="tabla-estadisticas-jugadores">
                    </table>
            </div>
        </section>

        <a href="#ancla" class="boton-inicio" aria-label="Volver al inicio">⇧</a>
    </main>
    <script src="../scripts/scriptnba.js"></script>
    <script src="../scripts/navScript.js"></script>
</body>
</html>
